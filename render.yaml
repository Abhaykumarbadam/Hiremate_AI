services:
  - type: web
    name: hiremate-api
    runtime: python
    plan: free
    rootDir: project
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backendmp:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEY_FALLBACK
        sync: false
      - key: ALLOWED_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173
